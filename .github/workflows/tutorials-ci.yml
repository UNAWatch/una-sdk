name: CI Tutorials

on:
  push:
    branches: [ main, develop ]
    tags: [ '*' ]
    paths:
      - 'Docs/Tutorials/**'
      - '.github/scripts/generate-tutorials-app-list.py'
      - '.github/workflows/tutorials-ci.yml'
  pull_request:
    paths:
      - 'Docs/Tutorials/**'
      - '.github/scripts/generate-tutorials-app-list.py'
      - '.github/workflows/tutorials-ci.yml'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      cmake_apps: ${{ steps.generate.outputs.cmake_apps }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate cmake apps list
        id: generate
        run: |
          python .github/scripts/generate-tutorials-app-list.py > cmake_apps.json
          cmake_apps=$(jq -c '.cmake_apps' cmake_apps.json)
          echo "cmake_apps=$cmake_apps" >> $GITHUB_OUTPUT

  cmake-build:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        app: ${{ fromJson(needs.prepare.outputs.cmake_apps) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake make python3 python3-pip gcc-arm-none-eabi

      - name: Set up UNA_SDK
        run: echo "UNA_SDK=$PWD" >> $GITHUB_ENV

      - name: Build ${{ matrix.app }}
        run: |
          cd Docs/Tutorials/${{ matrix.app }}/Software/Apps/${{ matrix.app }}-CMake
          mkdir -p build
          cd build
          cmake ..
          make -j$(nproc)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-output
          path: Docs/Tutorials/${{ matrix.app }}/Output/

  release:
    runs-on: ubuntu-latest
    needs: cmake-build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release archive
        run: |
          zip -r tutorials-release.zip artifacts/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: tutorials-release.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}